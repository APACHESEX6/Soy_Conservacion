name: Dependency Audit

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Diariamente a las 3 AM UTC
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: |
          echo "## 🔍 Production Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
          pnpm audit --prod 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Audit all dependencies
        run: |
          echo "## 🔍 Full Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
          pnpm audit 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Known issues summary
        run: |
          echo "## ℹ️ Known accepted vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`xlsx\`: GHSA-5pgg-2g8v-p4x9 — sin parche disponible, uso interno solo" >> "$GITHUB_STEP_SUMMARY"
          echo "- Overrides aplicados para: postcss, nanoid, esbuild, @hono/node-server" >> "$GITHUB_STEP_SUMMARY"

name: Dependency Audit

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 3 AM UTC
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  audit:
    name: npm/pnpm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (production only)
        id: audit-prod
        run: |
          echo "## Production Audit" >> $GITHUB_STEP_SUMMARY
          pnpm audit --prod 2>&1 || true
          echo "audit-prod-status=completed" >> $GITHUB_OUTPUT

      - name: Audit (all)
        id: audit-all
        run: |
          echo "## Full Audit" >> $GITHUB_STEP_SUMMARY
          pnpm audit 2>&1 || true
          echo "audit-all-status=completed" >> $GITHUB_OUTPUT

      - name: Audit Summary
        run: |
          echo "### ⚠️ Audit completed with known issues" >> $GITHUB_STEP_SUMMARY
          echo "- xlsx package has unpatched vulnerability (GHSA-5pgg-2g8v-p4x9)" >> $GITHUB_STEP_SUMMARY
          echo "- Overrides applied for postcss, nanoid, esbuild, @hono/node-server" >> $GITHUB_STEP_SUMMARY

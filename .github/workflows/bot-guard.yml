name: Bot Guard

# Bloquea PRs y pushes directos de bots no autorizados.
# Los únicos bots permitidos son dependabot (actualizaciones de dependencias)
# y github-actions (workflows internos del repo).
# Cualquier otro actor automatizado — incluyendo herramientas de IA que crean
# ramas o abren PRs sin supervisión humana — es rechazado con fallo explícito.

on:
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "release/**"
  pull_request_target:
    branches:
      - main
      - develop

concurrency:
  group: bot-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Bloquear actores no autorizados ──────────────────────────────────────
  check-actor:
    name: Verify PR actor is human or allowed bot
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # para poder comentar en el PR
      contents: read

    steps:
      - name: Identify actor
        id: actor
        run: |
          ACTOR="${{ github.actor }}"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"

          # Bots explícitamente permitidos
          ALLOWED_BOTS="dependabot[bot] github-actions[bot]"

          IS_BOT=false
          # GitHub marca los bots con el sufijo [bot] en el actor
          if [[ "$ACTOR" == *"[bot]"* ]]; then
            IS_BOT=true
          fi

          echo "is_bot=$IS_BOT" >> "$GITHUB_OUTPUT"

          if $IS_BOT; then
            if echo "$ALLOWED_BOTS" | grep -qw "$ACTOR"; then
              echo "allowed=true" >> "$GITHUB_OUTPUT"
              echo "✅ Bot permitido: $ACTOR"
            else
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              echo "🚫 Bot NO autorizado: $ACTOR"
            fi
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            echo "👤 Actor humano: $ACTOR"
          fi

      - name: Block unauthorized bot
        if: steps.actor.outputs.is_bot == 'true' && steps.actor.outputs.allowed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const actor = '${{ github.actor }}';
            const prNumber = context.payload.pull_request?.number;

            // Comentar en el PR explicando el rechazo
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## 🚫 PR bloqueado — bot no autorizado',
                  '',
                  `Este PR fue abierto por \`${actor}\`, un bot que no está en la lista de actores permitidos.`,
                  '',
                  '**Bots permitidos:** `dependabot[bot]`, `github-actions[bot]`',
                  '',
                  'Si eres un colaborador humano usando una herramienta de IA (Copilot, Cursor, Kiro, etc.),',
                  'abre el PR manualmente desde tu cuenta personal. Las herramientas de IA deben operar',
                  'bajo supervisión humana — no crear ramas ni PRs de forma autónoma.',
                  '',
                  '**Acción requerida:** cierra este PR y ábrelo desde tu cuenta de GitHub.',
                ].join('\n'),
              });

              // Solicitar cambios para bloquear el merge
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'REQUEST_CHANGES',
                body: `PR abierto por bot no autorizado (${actor}). Requiere intervención humana.`,
              });
            }

            core.setFailed(
              `PR rechazado: el actor "${actor}" es un bot no autorizado. ` +
              'Solo dependabot[bot] y github-actions[bot] pueden abrir PRs automáticos.'
            );

  # ── 2. Validar nombre de rama ────────────────────────────────────────────────
  check-branch-name:
    name: Validate branch naming convention
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check branch name
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          # Patrón permitido: feature/nombre, fix/nombre, release/x.y.z,
          # hotfix/nombre, chore/nombre, docs/nombre, refactor/nombre
          # El nombre debe ser kebab-case con letras, números y guiones.
          PATTERN='^(feature|fix|release|hotfix|chore|docs|refactor|test)/[a-z0-9][a-z0-9\-]*[a-z0-9]$'

          if echo "$BRANCH" | grep -qE "$PATTERN"; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "✅ Nombre de rama válido: $BRANCH"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "❌ Nombre de rama inválido: $BRANCH"
            echo "   Patrón requerido: feature/nombre, fix/nombre, release/x.y.z, etc."
          fi

      - name: Warn on invalid branch name
        if: steps.branch.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.head_ref }}';
            const prNumber = context.payload.pull_request?.number;

            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## ⚠️ Nombre de rama no sigue la convención',
                  '',
                  `La rama \`${branch}\` no sigue el patrón requerido.`,
                  '',
                  '**Formato esperado:** `tipo/descripcion-en-kebab-case`',
                  '',
                  '| Tipo | Ejemplo |',
                  '|------|---------|',
                  '| `feature/` | `feature/diego-alejandro` |',
                  '| `fix/` | `fix/conteo-observaciones` |',
                  '| `release/` | `release/1.2.0` |',
                  '| `hotfix/` | `hotfix/crash-mapa` |',
                  '| `chore/` | `chore/actualizar-deps` |',
                  '',
                  'Ramas generadas por bots de IA suelen tener nombres como `cursor/...`, `copilot/...`,',
                  '`kiro/...` o UUIDs aleatorios — estos son rechazados automáticamente.',
                ].join('\n'),
              });
            }

            // Warning, no fallo — el equipo puede decidir si acepta la rama
            core.warning(
              `Rama "${branch}" no sigue la convención de nombres. ` +
              'Formato esperado: tipo/descripcion-en-kebab-case'
            );
